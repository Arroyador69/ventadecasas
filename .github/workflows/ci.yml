name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_WHATSAPP_NUMBER: "34600000000"
          NEXT_PUBLIC_SITE_URL: "https://ventadecasas.vercel.app"

  # Vercel despliega automáticamente al conectar el repo.
  # Este job verifica que el build pasa en cada push.
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Build successful
        run: echo "✅ Build OK — Vercel desplegará automáticamente si el repo está conectado."
